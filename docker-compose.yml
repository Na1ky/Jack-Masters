services:
  app:
    build: .
    ports:
      - "8080:80"
    environment:
      DB_HOST: db
      DB_USER: blackjack
      DB_PASS: blackjack
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Mount source for live editing during development
      - .:/var/www/html

  db:
    image: mariadb:10.11
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: blackjack
      MYSQL_USER: blackjack
      MYSQL_PASSWORD: blackjack
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db/blackjack_db.sql:/docker-entrypoint-initdb.d/blackjack_db.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
